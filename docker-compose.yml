services:
  pktgen:
    build: .
    container_name: clabpktgen-dev
    # Use 'bridge' (default) for Containerlab deployments where eth1 is attached by clab.
    # Use 'host' for standalone Pi testing so physical NICs (enx*, eth*) are visible.
    network_mode: bridge
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN   # ip route manipulation
      - NET_RAW     # raw socket / Scapy
    # privileged covers any edge-case capability gaps on older kernels
    privileged: true
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # - STATIC_ROUTES=10.0.2.0/24|10.64.254.1|eth0,10.77.7.0/24|10.64.254.1|eth0,10.255.2.0/24|10.64.254.1|eth0
